<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">SnipDrop transparent tray logo draft</title>
  <desc id="desc">ASCII-style screenshot dragged into a rounded command prompt target on a transparent background.</desc>
  <defs>
    <filter id="softGlow" x="-35%" y="-35%" width="170%" height="170%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g fill="none" stroke-linecap="square" stroke-linejoin="round">
    <g transform="translate(42 28) rotate(-8 62 46)" filter="url(#softGlow)">
      <path d="M0 14h124M0 14v78M0 92h124M124 14v78" stroke="#f8fafc" stroke-width="8" stroke-dasharray="14 9"/>
      <path d="M0 14h124M0 92h124" stroke="#f8fafc" stroke-width="8" stroke-dasharray="1 22"/>
      <path d="M18 61l23-34 34 44 31-50" stroke="#8dff4f" stroke-width="9"/>
      <path d="M22 32h18v18H22z" stroke="#22d3ee" stroke-width="7"/>
    </g>

    <path d="M126 104c28 12 46 26 54 45" stroke="#f8fafc" stroke-width="7" stroke-dasharray="11 14"/>
    <path d="M169 141l13 13 13-13" stroke="#f8fafc" stroke-width="7"/>

    <rect x="43" y="155" width="170" height="55" rx="18" stroke="#2f6fff" stroke-width="8" stroke-dasharray="17 12"/>
    <path d="M64 175l19 13-19 13" stroke="#f8fafc" stroke-width="8"/>
    <path d="M101 192h82" stroke="#f8fafc" stroke-width="7" stroke-dasharray="12 12"/>

    <path d="M120 89v57l14-13 9 23 13-5-9-23h20z" fill="#0b0f19" stroke="#f8fafc" stroke-width="6"/>
  </g>
</svg>
